<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Oculta a barra de rolagem mas permite o scroll no carrossel */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-black text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-light tracking-widest">STORE</a>
            <div class="flex gap-4 items-center">
                {% if current_user.is_authenticated %}
                    {% if current_user.is_admin %}
                        <a href="{{ url_for('admin_panel') }}" class="text-sm uppercase tracking-wide hover:text-gray-300">Admin</a>
                    {% endif %}
                    <a href="{{ url_for('minhas_compras') }}" class="text-sm uppercase tracking-wide hover:text-gray-300">Minhas Compras</a>
                    <a href="{{ url_for('logout') }}" class="text-sm bg-white text-black px-4 py-1 rounded-full font-medium hover:bg-gray-200">Sair</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="text-sm uppercase tracking-wide hover:text-gray-300">Entrar</a>
                    <a href="{{ url_for('register') }}" class="text-sm bg-white text-black px-4 py-1 rounded-full font-medium hover:bg-gray-200">Cadastrar</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-4 mt-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
