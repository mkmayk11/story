{% extends "base.html" %}
{% block content %}
<h2 class="text-3xl font-light mb-8 border-b pb-2">Minhas Compras</h2>

<div class="space-y-6">
    {% for pedido in pedidos %}
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-medium">Pedido #{{ pedido.id }}</h3>
            <span class="text-sm font-semibold text-gray-700 bg-gray-100 px-3 py-1 rounded-full uppercase tracking-wider">
                {{ status_map[pedido.status] }}
            </span>
        </div>

        <!-- Barra de Progresso das 5 Etapas -->
        <div class="relative pt-1">
            <div class="flex mb-2 items-center justify-between">
                <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full {% if pedido.status >= 1 %}text-black bg-gray-200{% else %}text-gray-400{% endif %}">
                    Pagamento
                </div>
                <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full {% if pedido.status >= 2 %}text-black bg-gray-200{% else %}text-gray-400{% endif %}">
                    Aprovado
                </div>
                <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full {% if pedido.status >= 3 %}text-black bg-gray-200{% else %}text-gray-400{% endif %}">
                    Preparação
                </div>
                <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full {% if pedido.status >= 4 %}text-black bg-gray-200{% else %}text-gray-400{% endif %}">
                    A Caminho
                </div>
                <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full {% if pedido.status == 5 %}text-white bg-black{% else %}text-gray-400{% endif %}">
                    Entregue
                </div>
            </div>
            <!-- Linha de preenchimento do progresso -->
            <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-gray-100">
                <div style="width: {{ (pedido.status / 5) * 100 }}%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-black transition-all duration-500"></div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="bg-white p-8 text-center rounded-xl border border-gray-100">
        <p class="text-gray-500 mb-4">Você ainda não realizou nenhuma compra.</p>
        <a href="{{ url_for('index') }}" class="text-black underline font-medium hover:text-gray-700">Ver produtos</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
