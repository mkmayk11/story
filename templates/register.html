{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-10">
    <h2 class="text-2xl font-light mb-6 text-center tracking-wide uppercase">Criar Conta</h2>
    
    <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-600 mb-1">Nome Completo</label>
            <input type="text" name="nome" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
        </div>
        
        <div>
            <label class="block text-sm text-gray-600 mb-1">Endereço Completo</label>
            <input type="text" name="endereco" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Bairro</label>
                <input type="text" name="bairro" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Telefone</label>
                <input type="text" name="telefone" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
            </div>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Nome de Usuário</label>
            <input type="text" name="username" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
        </div>
        
        <div>
            <label class="block text-sm text-gray-600 mb-1">Senha</label>
            <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors">
        </div>
        
        <button type="submit" class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition-colors uppercase text-sm tracking-wider mt-4">
            Finalizar Cadastro
        </button>
    </form>
    
    <p class="text-center text-sm text-gray-500 mt-6">
        Já tem uma conta? <a href="{{ url_for('login') }}" class="text-black hover:underline">Entre aqui</a>
    </p>
</div>
{% endblock %}
