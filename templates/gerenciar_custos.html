{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-8">
    <h2 class="text-2xl font-light mb-2 text-center tracking-wide uppercase">Gerenciamento de Custos</h2>
    <p class="text-xs text-gray-500 text-center mb-6">Selecione um produto abaixo para definir ou alterar o custo real para o seu sistema de caixa.</p>
    
    <form method="POST" action="{{ url_for('gerenciar_custos') }}" class="space-y-5">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Selecione o Produto</label>
            <select name="produto_id" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <option value="" disabled selected>Escolha na lista...</option>
                {% for p in produtos %}
                    <option value="{{ p.id }}">
                        {{ p.nome }} — Venda: R$ {{ "%.2f"|format(p.preco) }} {% if p.custo is not none %} (Custo Atual: R$ {{ "%.2f"|format(p.custo) }}){% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Valor de Custo Real (R$)</label>
            <input type="number" step="0.01" name="custo" placeholder="Ex: 25.50" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <div class="flex gap-4 pt-2">
            <a href="{{ url_for('admin_panel') }}" class="w-1/3 text-center bg-gray-200 text-black py-3 rounded-lg hover:bg-gray-300 transition-colors uppercase text-sm tracking-wider font-bold">
                Voltar
            </a>
            <button type="submit" class="w-2/3 bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition-colors uppercase text-sm tracking-wider font-bold">
                Salvar Custo
            </button>
        </div>
    </form>
</div>
{% endblock %}
