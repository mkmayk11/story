{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-8">
    <h2 class="text-2xl font-light mb-6 text-center tracking-wide uppercase">Adicionar Novo Produto</h2>
    
    <form method="POST" action="{{ url_for('add_product') }}" enctype="multipart/form-data" class="space-y-5">
        <div>
            <label class="block text-sm text-gray-600 mb-1">Nome do Produto</label>
            <input type="text" name="nome" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Preço Antigo (Fictício/Riscado)</label>
                <input type="number" step="0.01" name="preco_antigo" placeholder="Ex: 90.00" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-green-700 mb-1">Preço Atual (Real)*</label>
                <input type="number" step="0.01" name="preco" placeholder="Ex: 59.90" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
        </div>
        
        <div>
            <label class="block text-sm text-gray-600 mb-1">Categoria</label>
            <select name="categoria" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="" disabled selected>Selecione a categoria</option>
                <option value="Roupas Femininas">Roupas Femininas</option>
                <option value="Roupas Masculinas">Roupas Masculinas</option>
                <option value="Eletrodomésticos">Eletrodomésticos</option>
                <option value="Melhorias para Casa">Melhorias para Casa</option>
                <option value="Ferramentas">Ferramentas</option>
                <option value="Cozinha">Cozinha</option>
                <option value="Banheiro">Banheiro</option>
                <option value="Quarto">Quarto</option>
                <option value="Decoração">Decoração</option>
                <option value="Eletrônicos">Eletrônicos</option>
                <option value="Calçados">Calçados</option>
                <option value="Adornos">Adornos</option>
                <option value="Diversos">Diversos</option>
            </select>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Descrição</label>
            <textarea name="descricao" required rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        
        <div>
            <label class="block text-sm text-gray-600 mb-1">Fotos do Produto (Selecione uma ou mais)</label>
            <input type="file" name="fotos" multiple accept="image/*" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
        </div>
        
        <div>
            <label class="block text-sm text-gray-600 mb-1">Link do Vídeo (Opcional - YouTube/TikTok)</label>
            <input type="text" name="video_url" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Link de Pagamento (PagBank)</label>
            <input type="text" name="link_pagamento" placeholder="Cole o link de pagamento aqui" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="flex items-center gap-2">
            <input type="checkbox" name="destaque" id="destaque" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
            <label for="destaque" class="text-sm text-gray-600">Produto em Destaque (Aparece na página inicial)</label>
        </div>
        
        <div class="flex gap-4">
            <a href="{{ url_for('admin_panel') }}" class="w-1/3 text-center bg-gray-200 text-black py-3 rounded-lg hover:bg-gray-300 transition-colors uppercase text-sm tracking-wider font-bold">
                Cancelar
            </a>
            <button type="submit" class="w-2/3 bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition-colors uppercase text-sm tracking-wider font-bold">
                Cadastrar Produto
            </button>
        </div>
    </form>
</div>
{% endblock %}
