{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-xl shadow-sm border border-gray-100 mt-20 text-center">
    <h2 class="text-2xl font-light mb-4">Tudo pronto!</h2>
    <p class="text-gray-600 mb-8">Clique no botão abaixo para concluir seu pagamento em um ambiente seguro.</p>
    
    <a href="{{ link }}" 
       target="_blank" 
       rel="noopener noreferrer"
       class="block w-full bg-green-600 text-white py-4 rounded-lg hover:bg-green-700 transition-colors font-bold uppercase tracking-wider">
       Ir para o Pagamento Seguro
    </a>
    
    <p class="text-xs text-gray-400 mt-6">Você será redirecionado para o ambiente oficial do PagBank.</p>
</div>
{% endblock %}
